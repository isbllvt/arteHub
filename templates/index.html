<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Nova Matriz</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@500&display=swap" rel="stylesheet" />
</head>
<body>
    <div class="topbar">
        <a href="/" class="logo">
            <span class="logo-text">Ateliê <span>Digital</span></span>
        </a>
        <a href="/" class="btn-outline">← Voltar para Biblioteca</a>
    </div>

    <div class="form-container">
        <div class="card-form">
            <h2>Enviar Arquivo .PES</h2>
            <form method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Nome da Matriz</label>
                    <input type="text" name="nome_matriz" placeholder="Ex: Urso com Laço" required>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>Categoria</label>
                        <input type="text" name="categoria" list="lista-categorias" placeholder="Escolha ou digite uma nova" autocomplete="off" required>
                        <datalist id="lista-categorias">
                            {% for cat in categorias %}
                                <option value="{{ cat }}">
                            {% endfor %}
                        </datalist>
                    </div>
                    
                    <div class="form-group">
                        <label>Tema</label>
                        <input type="text" name="tema" placeholder="Ex: Batizado, Férias...">
                    </div>
                </div>

                <div class="form-group">
                    <label>Arquivo PES</label>
                    <input type="file" name="file" accept=".pes" required>
                </div>
                
                <button type="submit" class="btn-primary" style="width: 100%;">Salvar Matriz</button>
            </form>
        </div>
    </div>
</body>
</html>
